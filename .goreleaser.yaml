# .goreleaser.yaml — pmtop release pipeline
# See: https://goreleaser.com
version: 2

project_name: pmtop

before:
  hooks:
    - make man
    - make completions

builds:
  - id: pmtop
    main: ./cmd/pmtop
    binary: pmtop
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/pmtop/pmtop/internal/version.Version={{.Version}}
      - -X github.com/pmtop/pmtop/internal/version.Commit={{.ShortCommit}}
      - -X github.com/pmtop/pmtop/internal/version.Date={{.Date}}

archives:
  - id: default
    builds: [pmtop]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - README.md
      - man/pmtop.8
      - completions/bash/pmtop
      - completions/zsh/_pmtop
      - completions/fish/pmtop.fish

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

nfpms:
  - id: pmtop
    package_name: pmtop
    homepage: https://github.com/pmtop/pmtop
    license: MIT
    maintainer: pmtop contributors
    description: |
      Interactive terminal UI for inspecting Linux ports, processes,
      and container associations.
    formats:
      - deb
      - rpm
    file_name_template: >-
      {{ .PackageName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    contents:
      - src: man/pmtop.8
        dst: /usr/share/man/man8/pmtop.8
      - src: completions/bash/pmtop
        dst: /usr/share/bash-completion/completions/pmtop
      - src: completions/zsh/_pmtop
        dst: /usr/share/zsh/site-functions/_pmtop
      - src: completions/fish/pmtop.fish
        dst: /usr/share/fish/vendor_completions.d/pmtop.fish
      - src: LICENSE
        dst: /usr/share/licenses/pmtop/LICENSE
      - src: README.md
        dst: /usr/share/doc/pmtop/README.md

aurs:
  - name: pmtop-bin
    homepage: https://github.com/pmtop/pmtop
    description: Interactive terminal UI for inspecting Linux ports, processes, and container associations.
    license: MIT
    maintainers:
      - pmtop contributors
    private_key: "{{ .Env.AUR_SSH_PRIVATE_KEY }}"
    git_url: ssh://aur@aur.archlinux.org/pmtop-bin.git
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    package: |-
      # bin
      install -Dm755 "./pmtop" "{{ .PkgDir }}/usr/bin/pmtop"
      # man
      install -Dm644 "./man/pmtop.8" "{{ .PkgDir }}/usr/share/man/man8/pmtop.8"
      # completions
      install -Dm644 "./completions/bash/pmtop" "{{ .PkgDir }}/usr/share/bash-completion/completions/pmtop"
      install -Dm644 "./completions/zsh/_pmtop" "{{ .PkgDir }}/usr/share/zsh/site-functions/_pmtop"
      install -Dm644 "./completions/fish/pmtop.fish" "{{ .PkgDir }}/usr/share/fish/vendor_completions.d/pmtop.fish"
      # license
      install -Dm644 "./LICENSE" "{{ .PkgDir }}/usr/share/licenses/pmtop/LICENSE"
    pkgbuild: |-
      # Maintainer: pmtop contributors
      pkgname=pmtop-bin
      pkgver={{ .Version }}
      pkgrel=1
      pkgdesc="Interactive terminal UI for inspecting Linux ports, processes, and container associations."
      arch=('x86_64' 'aarch64')
      url="https://github.com/pmtop/pmtop"
      license=('MIT')
      provides=('pmtop')
      conflicts=('pmtop')
      source_x86_64=("${url}/releases/download/{{ .Tag }}/{{ .ArtifactName }}")
      sha256sums_x86_64=('{{ .Sha256 }}')
      source_aarch64=("${url}/releases/download/{{ .Tag }}/{{ .ArtifactName }}")
      sha256sums_aarch64=('{{ .Sha256 }}')

      package() {
          cd "${srcdir}"
          install -Dm755 pmtop "${pkgdir}/usr/bin/pmtop"
      }

brews:
  - name: pmtop
    homepage: https://github.com/pmtop/pmtop
    description: Interactive terminal UI for inspecting Linux ports, processes, and container associations.
    license: MIT
    repository:
      owner: pmtop
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"

release:
  github:
    owner: pmtop
    name: pmtop
  draft: true
  prerelease: auto
